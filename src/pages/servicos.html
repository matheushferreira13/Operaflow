<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serviços - OperaFlow</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <header class="cabecalho">
    <div class="logo">
      <img src="#" alt="logo">
    </div>
    <nav class="menu">
      <ul>
        <li><a href="./index.html">Inicio</a></li>
        <li><a href="./servicos.html">Servicos</a></li>
        <li><a href="./pedidos.html">Pedidos</a></li>
      </ul>
    </nav>
  </header>
  <section class="produtos">
    <h1>Produtos</h1>
    <div class="grid-produtos">
      <div class="produtos">
        <div class="imagem">IMG</div>
        <h3>Notebook</h3>
        <p class="preço">R$1.900,00</p>
        <button class="btn-produtos">Comprar</button>
      </div>
      <div class="produtos">
        <div class="imagem">IMG</div>
        <h3>Mouse gamer</h3>
        <p class="preço">R$150,00</p>
        <button class="btn-produtos">Comprar</button>
      </div>
      <div class="produtos">
        <div class="imagem">IMG</div>
        <h3>Teclado Gamer</h3>
        <p class="preço">R$100,00</p>
        <button class="btn-produtos">Comprar</button>
      </div>
      <div class="produtos">
        <div class="imagem">IMG</div>
        <h3>Monitor LCD 19' Gamer</h3>
        <p class="preço">R$600,00</p>
        <button class="btn-produtos">Comprar</button>
      </div>
      <div class="produtos">
        <div class="imagem">IMG</div>
        <h3>SSD Sata 500gb</h3>
        <p class="preço">R$350,00</p>
        <button class="btn-produtos">Comprar</button>
      </div>
      <div class="produtos">
        <div class="imagem">IMG</div>
        <h3>Placa de vídeo NVDIA 1080p</h3>
        <p class="preço">R$550,00</p>
        <button class="btn-produtos">Comprar</button>
      </div>
    </div>

  <div id="page-transition" class="page-transition" aria-hidden="true">
    <img class="transition-logo" src="../assets/img/logo (1).png" alt="Carregando OperaFlow">
    <div class="transition-spinner" aria-label="Carregando..."></div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const transition = document.getElementById('page-transition');
      document.querySelectorAll('a[href]').forEach((link) => {
        const href = link.getAttribute('href');
        if (href.startsWith('#') || href.startsWith('mailto:') || href.startsWith('tel:')) return;
        link.addEventListener('click', (event) => {
          const url = link.href;
          if (!url) return;
          event.preventDefault();
          transition.classList.add('visible');
          transition.setAttribute('aria-hidden', 'false');
          setTimeout(() => {
            window.location.href = url;
          }, 550);
        });
      });
    });
  </script>
</body>
</html>
